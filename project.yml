# XcodeGen manifest — the SOURCE OF TRUTH for the app target.
# Spyglass.xcodeproj is generated (`just generate`) and gitignored; never hand-edit it.
name: Spyglass
options:
  bundleIdPrefix: io.github.tomada1114
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  SpyglassKit:
    path: Packages/SpyglassKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Spyglass:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: SpyglassKit
        product: SpyglassUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.tomada1114.Spyglass
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/Spyglass.entitlements
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSUIElement: YES
  SpyglassLaunchUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [LaunchUITests]
    dependencies:
      - target: Spyglass
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Spyglass:
    build:
      targets: { Spyglass: all }
    test:
      targets: [SpyglassLaunchUITests]
