name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # XcodeGen/xcbeautify are macOS-only; install just the Linux-capable linters here.
          install_args: swiftlint swiftformat actionlint shellcheck

      - name: SwiftFormat check
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint lint --strict --quiet

      - name: ShellCheck
        run: shellcheck scripts/*.sh .githooks/pre-commit

      - name: actionlint
        # With shellcheck on PATH, actionlint also lints workflow run: blocks.
        run: actionlint

  test:
    name: Test & Coverage Gate
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select the pinned Xcode
        run: echo "DEVELOPER_DIR=/Applications/Xcode_$(cat .xcode-version).app" >> "$GITHUB_ENV"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Run tests with coverage floor
        run: scripts/coverage.sh

  app:
    name: App Build, UI Test & Smoke
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select the pinned Xcode
        run: echo "DEVELOPER_DIR=/Applications/Xcode_$(cat .xcode-version).app" >> "$GITHUB_ENV"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Build app (Debug)
        run: just build

      - name: Run launch UI test
        run: just uitest

      - name: Smoke launch (Release)
        run: just smoke

      - name: Upload result bundles on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xcresult-bundles
          path: build/*.xcresult
          if-no-files-found: ignore
          retention-days: 7

  bootstrap-smoke:
    name: Template Bootstrap Smoke
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the local `git clone` below works from a non-shallow source.
          fetch-depth: 0

      - name: Select the pinned Xcode
        run: echo "DEVELOPER_DIR=/Applications/Xcode_$(cat .xcode-version).app" >> "$GITHUB_ENV"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Bootstrap a pristine copy as DemoApp
        run: |
          git clone . "$RUNNER_TEMP/bootstrap-smoke"
          mise trust "$RUNNER_TEMP/bootstrap-smoke/mise.toml"
          cd "$RUNNER_TEMP/bootstrap-smoke"
          scripts/bootstrap.sh DemoApp --bundle-id-prefix io.example --github-user demo

      - name: Assert no placeholders remain
        run: |
          cd "$RUNNER_TEMP/bootstrap-smoke"
          # Author/email placeholders are intentionally kept (no --author/--email above).
          # README's leftover-check line is spelled with wildcards, so it never matches.
          if grep -rilE 'my-?app|com\.example|tomada1114' . --exclude-dir=.git; then
            echo "::error::bootstrap left placeholder leftovers in the files listed above"
            exit 1
          fi

      - name: Assert CHANGELOG was reset
        run: |
          cd "$RUNNER_TEMP/bootstrap-smoke"
          grep -qF 'Initial project scaffold from' CHANGELOG.md || {
            echo "::error::bootstrap did not reset CHANGELOG.md"
            exit 1
          }
          if grep -qF 'Initial template:' CHANGELOG.md; then
            echo "::error::template history still present in CHANGELOG.md"
            exit 1
          fi

      - name: Test the renamed package
        run: |
          cd "$RUNNER_TEMP/bootstrap-smoke/Packages/DemoAppKit"
          swift test

      - name: Build the renamed app
        run: |
          cd "$RUNNER_TEMP/bootstrap-smoke"
          xcodegen generate
          set -o pipefail
          xcodebuild -project DemoApp.xcodeproj -scheme DemoApp -configuration Debug build | xcbeautify --quiet

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Spell check
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          config: typos.toml

  zizmor:
    name: Workflow Security Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Plain annotations instead of SARIF upload — keeps permissions read-only.
          advanced-security: false
