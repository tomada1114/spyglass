name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select the pinned Xcode
        run: echo "DEVELOPER_DIR=/Applications/Xcode_$(cat .xcode-version).app" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: swift
          build-mode: manual

      - name: Build the package for analysis
        # App/ is a thin @main shell; all logic lives in the local package
        # (docs/architecture.md), so building it covers every analyzable line.
        run: swift build --package-path Packages/SpyglassKit

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
