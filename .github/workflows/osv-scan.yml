name: OSV Scan

on:
  pull_request:
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan dependencies for known vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: OSV scan
        if: ${{ hashFiles('**/Package.resolved') != '' }}
        # The runnable action lives in the osv-scanner-action/ subdirectory;
        # the repository root has no runs: section and fails at job setup.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Nothing to scan
        if: ${{ hashFiles('**/Package.resolved') == '' }}
        run: echo "::notice::No Package.resolved found — the template has zero dependencies. The scan activates once you add one."
